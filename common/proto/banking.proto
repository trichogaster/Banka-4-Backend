syntax = "proto3";

package banking.v1;

option go_package = "common/pkg/pb;pb";

service BankingService {
  rpc GetAccountByNumber(GetAccountByNumberRequest) returns (GetAccountByNumberResponse);
  rpc ExecuteTradeSettlement(ExecuteTradeSettlementRequest) returns (ExecuteTradeSettlementResponse);
}

enum TradeSettlementDirection {
  TRADE_SETTLEMENT_DIRECTION_UNSPECIFIED = 0;
  TRADE_SETTLEMENT_DIRECTION_BUY = 1;
  TRADE_SETTLEMENT_DIRECTION_SELL = 2;
}

message GetAccountByNumberRequest {
  string account_number = 1;
}

message GetAccountByNumberResponse {
  string account_number  = 1;
  uint64 client_id       = 2;
  string account_type    = 3;
  string currency_code   = 4;
  double available_balance = 5;
}

message ExecuteTradeSettlementRequest {
  string account_number = 1;
  string trade_currency_code = 2;
  TradeSettlementDirection direction = 3;
  double amount = 4;
}

message ExecuteTradeSettlementResponse {
  uint64 transaction_id = 1;
  double source_amount = 2;
  string source_currency_code = 3;
  double destination_amount = 4;
  string destination_currency_code = 5;
}
