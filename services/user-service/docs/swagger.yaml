definitions:
  auth.IdentityType:
    enum:
    - employee
    - client
    type: string
    x-enum-varnames:
    - IdentityEmployee
    - IdentityClient
  dto.ActivateAccountRequest:
    properties:
      password:
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
  dto.ActuaryResponse:
    properties:
      active:
        type: boolean
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_agent:
        type: boolean
      is_supervisor:
        type: boolean
      last_name:
        type: string
      limit:
        type: number
      need_approval:
        type: boolean
      position_id:
        type: integer
      used_limit:
        type: number
      username:
        type: string
    type: object
  dto.AuthUser:
    properties:
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      identity_type:
        $ref: '#/definitions/auth.IdentityType'
      is_agent:
        type: boolean
      is_supervisor:
        type: boolean
      last_name:
        type: string
      limit:
        type: number
      need_approval:
        type: boolean
      permissions:
        items:
          $ref: '#/definitions/permission.Permission'
        type: array
      used_limit:
        type: number
      username:
        type: string
    type: object
  dto.ChangePasswordRequest:
    properties:
      new_password:
        type: string
      old_password:
        type: string
    required:
    - new_password
    - old_password
    type: object
  dto.CreateClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      first_name:
        maxLength: 20
        type: string
      gender:
        type: string
      last_name:
        maxLength: 100
        type: string
      phone_number:
        type: string
      username:
        type: string
    required:
    - email
    - first_name
    - last_name
    - username
    type: object
  dto.CreateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: string
      department:
        type: string
      email:
        type: string
      first_name:
        maxLength: 20
        type: string
      gender:
        type: string
      is_agent:
        type: boolean
      is_supervisor:
        type: boolean
      last_name:
        maxLength: 100
        type: string
      limit:
        minimum: 0
        type: number
      need_approval:
        type: boolean
      permissions:
        items:
          $ref: '#/definitions/permission.Permission'
        type: array
      phone_number:
        type: string
      position_id:
        type: integer
      username:
        type: string
    required:
    - email
    - first_name
    - last_name
    - position_id
    - username
    type: object
  dto.EmployeeResponse:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: string
      department:
        type: string
      email:
        type: string
      first_name:
        type: string
      gender:
        type: string
      id:
        type: integer
      is_agent:
        type: boolean
      is_supervisor:
        type: boolean
      last_name:
        type: string
      limit:
        type: number
      need_approval:
        type: boolean
      permissions:
        items:
          $ref: '#/definitions/permission.Permission'
        type: array
      phone_number:
        type: string
      position_id:
        type: integer
      used_limit:
        type: number
      username:
        type: string
    type: object
  dto.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.ListActuariesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ActuaryResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.ListEmployeesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.EmployeeResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
      total_pages:
        type: integer
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.AuthUser'
    type: object
  dto.MobileSecretResponse:
    properties:
      secret:
        type: string
    type: object
  dto.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RefreshResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
      user:
        $ref: '#/definitions/dto.AuthUser'
    type: object
  dto.ResendActivationRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  dto.ResetPasswordRequest:
    properties:
      new_password:
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  dto.UpdateActuarySettingsRequest:
    properties:
      limit:
        minimum: 0
        type: number
      need_approval:
        type: boolean
    type: object
  dto.UpdateClientRequest:
    properties:
      address:
        type: string
      date_of_birth:
        type: string
      email:
        type: string
      first_name:
        maxLength: 20
        type: string
      gender:
        type: string
      last_name:
        maxLength: 100
        type: string
      phone_number:
        type: string
      username:
        type: string
    type: object
  dto.UpdateEmployeeRequest:
    properties:
      active:
        type: boolean
      address:
        type: string
      date_of_birth:
        type: string
      department:
        type: string
      email:
        type: string
      first_name:
        maxLength: 20
        type: string
      gender:
        type: string
      is_agent:
        type: boolean
      is_supervisor:
        type: boolean
      last_name:
        maxLength: 100
        type: string
      permissions:
        items:
          $ref: '#/definitions/permission.Permission'
        type: array
      phone_number:
        type: string
      position_id:
        type: integer
      username:
        type: string
    type: object
  errors.AppError:
    properties:
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  permission.Permission:
    enum:
    - employee.view
    - employee.create
    - employee.update
    - employee.delete
    - client.view
    - client.update
    type: string
    x-enum-varnames:
    - EmployeeView
    - EmployeeCreate
    - EmployeeUpdate
    - EmployeeDelete
    - ClientView
    - ClientUpdate
info:
  contact: {}
  description: API for managing employees, clients, authentication, and permissions.
  title: User Service API
  version: "1.0"
paths:
  /api/actuaries:
    get:
      description: Returns a paginated list of actuaries with optional filtering by
        employee and actuary fields
      parameters:
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Filter by position
        in: query
        name: position
        type: string
      - description: Filter by department
        in: query
        name: department
        type: string
      - description: Filter by actuary type
        enum:
        - agent
        - supervisor
        in: query
        name: type
        type: string
      - description: Filter by active status
        in: query
        name: active
        type: boolean
      - description: Filter by need approval flag
        in: query
        name: need_approval
        type: boolean
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListActuariesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List actuaries
      tags:
      - actuaries
  /api/actuaries/{id}:
    patch:
      consumes:
      - application/json
      description: Updates an agent's limit and approval settings. Only supervisors
        can perform this action.
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Actuary settings
        in: body
        name: settings
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateActuarySettingsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ActuaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Update actuary settings
      tags:
      - actuaries
  /api/actuaries/{id}/reset-used-limit:
    post:
      description: Resets an agent's used limit to zero. Only supervisors can perform
        this action.
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ActuaryResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Reset actuary used limit
      tags:
      - actuaries
  /api/auth/activate:
    post:
      consumes:
      - application/json
      description: Activates an account by setting the initial password using an activation
        token
      parameters:
      - description: Activation token and new password
        in: body
        name: activation
        required: true
        schema:
          $ref: '#/definitions/dto.ActivateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Activate account
      tags:
      - auth
  /api/auth/change-password:
    post:
      consumes:
      - application/json
      description: Allows an authenticated user to change their password
      parameters:
      - description: Current and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Change password
      tags:
      - auth
  /api/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a password reset token to the email if it exists
      parameters:
      - description: Email address for password reset
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Request password reset
      tags:
      - auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user by email and password, returns JWT and refresh
        token
      parameters:
      - description: Login credentials
        in: body
        name: credentials
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Authenticate user
      tags:
      - auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Generates a new access token using a valid refresh token
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.RefreshResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Refresh access token
      tags:
      - auth
  /api/auth/resend-activation:
    post:
      consumes:
      - application/json
      description: Resends an activation email
      parameters:
      - description: Email
        in: body
        name: activation
        required: true
        schema:
          $ref: '#/definitions/dto.ResendActivationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Resend activation email
      tags:
      - auth
  /api/auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the password using a valid reset token
      parameters:
      - description: Password reset token and new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Reset password
      tags:
      - auth
  /api/clients:
    get:
      description: Returns a paginated list of clients. Supports filtering by email,
        first name, and last name. Requires ClientView permission.
      parameters:
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List all clients
      tags:
      - clients
  /api/clients/{id}:
    patch:
      consumes:
      - application/json
      description: Updates client details by ID. Requires ClientUpdate permission.
      parameters:
      - description: Client ID
        in: path
        name: id
        required: true
        type: integer
      - description: Fields to update
        in: body
        name: client
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateClientRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Update a client
      tags:
      - clients
  /api/clients/register:
    post:
      consumes:
      - application/json
      description: Creates a new client account and sends an activation email
      parameters:
      - description: Client registration data
        in: body
        name: client
        required: true
        schema:
          $ref: '#/definitions/dto.CreateClientRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Register a new client
      tags:
      - clients
  /api/employees:
    get:
      description: Returns a paginated list of employees with optional filtering
      parameters:
      - description: Filter by email
        in: query
        name: email
        type: string
      - description: Filter by first name
        in: query
        name: first_name
        type: string
      - description: Filter by last name
        in: query
        name: last_name
        type: string
      - description: Filter by position
        in: query
        name: position
        type: string
      - description: Page number
        in: query
        minimum: 1
        name: page
        type: integer
      - description: Page size
        in: query
        maximum: 100
        minimum: 1
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListEmployeesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: List employees
      tags:
      - employees
  /api/employees/{id}:
    get:
      description: Returns a single employee by their ID
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.EmployeeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get employee by ID
      tags:
      - employees
    patch:
      consumes:
      - application/json
      description: Updates employee information by ID
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      - description: Employee update data
        in: body
        name: employee
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateEmployeeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.EmployeeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Update employee profile
      tags:
      - employees
  /api/employees/{id}/deactivate:
    post:
      description: Sets the employee's active status to false
      parameters:
      - description: Employee ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Deactivate employee
      tags:
      - employees
  /api/employees/register:
    post:
      consumes:
      - application/json
      description: Creates a new employee account and returns the created employee
      parameters:
      - description: Employee registration data
        in: body
        name: employee
        required: true
        schema:
          $ref: '#/definitions/dto.CreateEmployeeRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.EmployeeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Register a new employee
      tags:
      - employees
  /api/secret-mobile:
    get:
      description: Returns TOTP secret for currently authenticated client
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.MobileSecretResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get mobile verification secret
      tags:
      - clients
securityDefinitions:
  BearerAuth:
    description: 'Enter "Bearer" followed by a space and your token. Example: "Bearer
      eyJhbGci..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
