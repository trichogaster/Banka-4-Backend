definitions:
  dto.AssetType:
    enum:
    - STOCK
    - FUTURES
    - OPTION
    - FOREX
    type: string
    x-enum-varnames:
    - AssetTypeStock
    - AssetTypeFutures
    - AssetTypeOption
    - AssetTypeForex
  dto.CreateOrderRequest:
    properties:
      account_number:
        type: string
      all_or_none:
        type: boolean
      direction:
        allOf:
        - $ref: '#/definitions/model.OrderDirection'
        enum:
        - BUY
        - SELL
      limit_value:
        type: number
      listing_id:
        type: integer
      margin:
        type: boolean
      order_type:
        allOf:
        - $ref: '#/definitions/model.OrderType'
        enum:
        - MARKET
        - LIMIT
        - STOP
        - STOP_LIMIT
      quantity:
        minimum: 1
        type: integer
      stop_value:
        type: number
    required:
    - account_number
    - direction
    - listing_id
    - order_type
    - quantity
    type: object
  dto.DailyPriceResponse:
    properties:
      ask:
        type: number
      bid:
        type: number
      change:
        type: number
      date:
        type: string
      price:
        type: number
      volume:
        type: integer
    type: object
  dto.ExchangeResponse:
    properties:
      acronym:
        type: string
      close_time:
        type: string
      currency:
        type: string
      exchange_id:
        type: integer
      mic_code:
        type: string
      name:
        type: string
      open_time:
        type: string
      polity:
        type: string
      time_zone:
        type: integer
      trading_enabled:
        type: boolean
    type: object
  dto.ForexResponse:
    properties:
      ask:
        type: number
      base:
        type: string
      bid:
        type: number
      change:
        type: number
      forexPairId:
        type: integer
      initialMarginCost:
        type: number
      maintenanceMargin:
        type: number
      price:
        type: number
      quote:
        type: string
      ticker:
        type: string
      volume:
        type: integer
    type: object
  dto.FuturesResponse:
    properties:
      ask:
        type: number
      bid:
        type: number
      change:
        type: number
      contract_size:
        type: number
      contract_unit:
        type: string
      exchange:
        type: string
      initial_margin_cost:
        type: number
      listing_id:
        type: integer
      maintenance_margin:
        type: number
      name:
        type: string
      price:
        type: number
      settlement_date:
        type: string
      ticker:
        type: string
      volume:
        type: integer
    type: object
  dto.ListOrdersResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.OrderSummaryResponse'
        type: array
      page:
        type: integer
      page_size:
        type: integer
      total:
        type: integer
    type: object
  dto.OptionResponse:
    properties:
      ask:
        type: number
      bid:
        type: number
      change:
        type: number
      exchange:
        type: string
      implied_volatility:
        type: number
      initial_margin_cost:
        type: number
      listing_id:
        type: integer
      maintenance_margin:
        type: number
      name:
        type: string
      open_interest:
        type: integer
      option_type:
        type: string
      price:
        type: number
      settlement_date:
        type: string
      strike:
        type: number
      ticker:
        type: string
      volume:
        type: integer
    type: object
  dto.OrderResponse:
    properties:
      account_number:
        type: string
      after_hours:
        type: boolean
      all_or_none:
        type: boolean
      approved_by:
        type: integer
      contract_size:
        type: number
      created_at:
        type: string
      direction:
        $ref: '#/definitions/model.OrderDirection'
      is_done:
        type: boolean
      limit_value:
        type: number
      listing_id:
        type: integer
      listing_name:
        type: string
      margin:
        type: boolean
      order_id:
        type: integer
      order_type:
        $ref: '#/definitions/model.OrderType'
      price_per_unit:
        type: number
      quantity:
        type: integer
      remaining_portions:
        type: integer
      status:
        $ref: '#/definitions/model.OrderStatus'
      stop_value:
        type: number
      ticker:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
    type: object
  dto.OrderSummaryResponse:
    properties:
      contract_size:
        type: number
      direction:
        $ref: '#/definitions/model.OrderDirection'
      listing_name:
        type: string
      order_id:
        type: integer
      price_per_unit:
        type: number
      quantity:
        type: integer
      remaining_portions:
        type: integer
      status:
        $ref: '#/definitions/model.OrderStatus'
      user_id:
        type: integer
    type: object
  dto.PaginatedForexResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.ForexResponse'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  dto.PaginatedFuturesResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.FuturesResponse'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  dto.PaginatedOptionResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.OptionResponse'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  dto.PaginatedStockResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/dto.StockResponse'
        type: array
      page:
        type: integer
      pageSize:
        type: integer
      total:
        type: integer
    type: object
  dto.PortfolioAssetResponse:
    properties:
      amount:
        type: number
      lastModified:
        type: string
      outstandingShares:
        type: number
      pricePerUnit:
        type: number
      profit:
        type: number
      taxAmount:
        type: number
      ticker:
        type: string
      type:
        $ref: '#/definitions/dto.AssetType'
    type: object
  dto.StockDetailedResponse:
    properties:
      ask:
        type: number
      bid:
        type: number
      change:
        type: number
      dividend_yield:
        type: number
      exchange:
        type: string
      history:
        items:
          $ref: '#/definitions/dto.DailyPriceResponse'
        type: array
      initial_margin_cost:
        type: number
      listing_id:
        type: integer
      maintenance_margin:
        type: number
      name:
        type: string
      options:
        items:
          $ref: '#/definitions/dto.OptionResponse'
        type: array
      outstanding_shares:
        type: number
      price:
        type: number
      ticker:
        type: string
      volume:
        type: integer
    type: object
  dto.StockResponse:
    properties:
      ask:
        type: number
      bid:
        type: number
      change:
        type: number
      dividend_yield:
        type: number
      exchange:
        type: string
      initial_margin_cost:
        type: number
      listing_id:
        type: integer
      maintenance_margin:
        type: number
      name:
        type: string
      outstanding_shares:
        type: number
      price:
        type: number
      ticker:
        type: string
      volume:
        type: integer
    type: object
  errors.AppError:
    properties:
      message:
        type: string
      status:
        type: string
      timestamp:
        type: string
    type: object
  model.OrderDirection:
    enum:
    - BUY
    - SELL
    type: string
    x-enum-varnames:
    - OrderDirectionBuy
    - OrderDirectionSell
  model.OrderStatus:
    enum:
    - PENDING
    - APPROVED
    - DECLINED
    type: string
    x-enum-varnames:
    - OrderStatusPending
    - OrderStatusApproved
    - OrderStatusDeclined
  model.OrderType:
    enum:
    - MARKET
    - LIMIT
    - STOP
    - STOP_LIMIT
    type: string
    x-enum-varnames:
    - OrderTypeMarket
    - OrderTypeLimit
    - OrderTypeStop
    - OrderTypeStopLimit
info:
  contact: {}
  description: API for managing portfolios, executing trades, and handling financial
    market operations.
  title: Trading Service API
  version: "1.0"
paths:
  /api/actuary/{actId}/assets:
    get:
      description: Returns all currently held asset positions for an actuary (employee
        agent/supervisor), aggregated from all orders. Only approved orders with fills
        are counted. Includes stocks, futures, options, and forex pairs.
      parameters:
      - description: Actuary ID
        in: path
        name: actId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PortfolioAssetResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get portfolio for an actuary/agent
      tags:
      - portfolio
  /api/client/{clientId}/assets:
    get:
      description: Returns all currently held asset positions for a client, aggregated
        from all orders. Only approved orders with fills are counted. Includes stocks,
        futures, options, and forex pairs.
      parameters:
      - description: Client ID
        in: path
        name: clientId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.PortfolioAssetResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get portfolio for a client
      tags:
      - portfolio
  /api/exchange:
    get:
      description: Returns a paginated list of all stock exchanges
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all exchanges
      tags:
      - exchange
  /api/exchange/{micCode}/toggle:
    patch:
      description: Enables or disables trading time enforcement for a specific exchange
        (for testing purposes)
      parameters:
      - description: Exchange MIC code
        in: path
        name: micCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ExchangeResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Toggle trading enabled for an exchange
      tags:
      - exchange
  /api/health:
    get:
      description: Returns service health status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Health check
      tags:
      - health
  /api/listings/forex:
    get:
      parameters:
      - description: Search by base/quote
        in: query
        name: search
        type: string
      - description: Min rate
        in: query
        name: price_min
        type: number
      - description: Max rate
        in: query
        name: price_max
        type: number
      - description: asc|desc
        in: query
        name: sort_dir
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedForexResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List forex pairs
      tags:
      - listings
  /api/listings/futures:
    get:
      parameters:
      - description: Search by ticker or name
        in: query
        name: search
        type: string
      - description: Exchange MIC prefix
        in: query
        name: exchange
        type: string
      - description: Min price
        in: query
        name: price_min
        type: number
      - description: Max price
        in: query
        name: price_max
        type: number
      - description: Min ask
        in: query
        name: ask_min
        type: number
      - description: Max ask
        in: query
        name: ask_max
        type: number
      - description: Min bid
        in: query
        name: bid_min
        type: number
      - description: Max bid
        in: query
        name: bid_max
        type: number
      - description: Min volume
        in: query
        name: volume_min
        type: integer
      - description: Max volume
        in: query
        name: volume_max
        type: integer
      - description: Filter by settlement date (YYYY-MM-DD)
        in: query
        name: settlement_date
        type: string
      - description: price|volume|maintenance_margin
        in: query
        name: sort_by
        type: string
      - description: asc|desc
        in: query
        name: sort_dir
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedFuturesResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List futures contracts
      tags:
      - listings
  /api/listings/options:
    get:
      parameters:
      - description: Search by ticker or name
        in: query
        name: search
        type: string
      - description: Exchange MIC prefix
        in: query
        name: exchange
        type: string
      - description: Min price
        in: query
        name: price_min
        type: number
      - description: Max price
        in: query
        name: price_max
        type: number
      - description: Min ask
        in: query
        name: ask_min
        type: number
      - description: Max ask
        in: query
        name: ask_max
        type: number
      - description: Min bid
        in: query
        name: bid_min
        type: number
      - description: Max bid
        in: query
        name: bid_max
        type: number
      - description: Min volume
        in: query
        name: volume_min
        type: integer
      - description: Max volume
        in: query
        name: volume_max
        type: integer
      - description: Filter by settlement date (YYYY-MM-DD)
        in: query
        name: settlement_date
        type: string
      - description: price|volume|maintenance_margin
        in: query
        name: sort_by
        type: string
      - description: asc|desc
        in: query
        name: sort_dir
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedOptionResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List options
      tags:
      - listings
  /api/listings/stock/listingId:
    get:
      consumes:
      - application/json
      description: Retrieves stock information for a specific listing by its ID.
      parameters:
      - description: Listing ID
        in: path
        name: listingId
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.StockDetailedResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/errors.AppError'
      security:
      - BearerAuth: []
      summary: Get stock details
      tags:
      - listings
  /api/listings/stocks:
    get:
      parameters:
      - description: Search by ticker or name
        in: query
        name: search
        type: string
      - description: Exchange MIC prefix
        in: query
        name: exchange
        type: string
      - description: Min price
        in: query
        name: price_min
        type: number
      - description: Max price
        in: query
        name: price_max
        type: number
      - description: Min ask
        in: query
        name: ask_min
        type: number
      - description: Max ask
        in: query
        name: ask_max
        type: number
      - description: Min bid
        in: query
        name: bid_min
        type: number
      - description: Max bid
        in: query
        name: bid_max
        type: number
      - description: Min volume
        in: query
        name: volume_min
        type: integer
      - description: Max volume
        in: query
        name: volume_max
        type: integer
      - description: price|volume|maintenance_margin
        in: query
        name: sort_by
        type: string
      - description: asc|desc
        in: query
        name: sort_dir
        type: string
      - description: Page
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.PaginatedStockResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: List stocks
      tags:
      - listings
  /api/orders:
    get:
      description: Returns a paginated and filtered list of orders. Clients see only
        their own orders, employees see all.
      parameters:
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Page size
        in: query
        name: page_size
        type: integer
      - description: Filter by status (PENDING, APPROVED, DECLINED)
        in: query
        name: status
        type: string
      - description: Filter by direction (BUY, SELL)
        in: query
        name: direction
        type: string
      - description: Filter by completion status
        in: query
        name: is_done
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ListOrdersResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Get all orders
      tags:
      - orders
    post:
      consumes:
      - application/json
      description: Creates a buy or sell order for a listing
      parameters:
      - description: Order details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.CreateOrderRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Create a new order
      tags:
      - orders
  /api/orders/{id}/approve:
    patch:
      description: Supervisor approves a pending order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Approve a pending order
      tags:
      - orders
  /api/orders/{id}/cancel:
    patch:
      description: Cancel a pending or approved order that hasn't been fully executed
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Cancel an order
      tags:
      - orders
  /api/orders/{id}/decline:
    patch:
      description: Supervisor declines a pending order
      parameters:
      - description: Order ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.OrderResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/errors.AppError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/errors.AppError'
      summary: Decline a pending order
      tags:
      - orders
securityDefinitions:
  BearerAuth:
    description: JWT Authorization header using the Bearer scheme.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
