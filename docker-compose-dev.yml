services:
  user_service_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - user_service_db_data:/var/lib/postgresql/data

  user_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/user-service/.air.toml
    depends_on:
      user_service_db:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${PORT}/api/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    volumes:
      - .:/app:Z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/user-service

  banking_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${BANKING_SERVICE_PORT}:${BANKING_SERVICE_PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/banking-service/.air.toml
      PORT: ${BANKING_SERVICE_PORT}
      GRPC_PORT: "50052"
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${BANKING_SERVICE_PORT}/api/health || exit 1
    volumes:
      - .:/app:Z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/banking-service

  trading_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${TRADING_SERVICE_PORT}:${TRADING_SERVICE_PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/trading-service/.air.toml
      PORT: ${TRADING_SERVICE_PORT}
      USER_SERVICE_ADDR: user_service:50051
      USER_SERVICE_BASE_URL: http://user_service:${PORT}
      BANKING_SERVICE_ADDR: banking_service:50052
    depends_on:
      user_service_db:
        condition: service_healthy
      user_service:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${TRADING_SERVICE_PORT}/api/health || exit 1
    volumes:
      - .:/app:Z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/trading-service

  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    volumes:
      - maildev_data:/data

volumes:
  user_service_db_data:
  maildev_data:
