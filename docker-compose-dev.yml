services:
  user_service_db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 3s
      timeout: 5s
      retries: 5
    volumes:
      - user_service_db_data:/var/lib/postgresql/data

  user_service:
    build:
      context: .
      dockerfile: docker/Dockerfile-dev
    ports:
      - "${PORT}:${PORT}"
    env_file: .env
    environment:
      AIR_CONFIG_PATH: /app/services/user-service/.air.toml
    depends_on:
      user_service_db:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${PORT}/api/health || exit 1
    volumes:
      - .:/app:Z
      - /app/tmp
      - /go/pkg/mod
    working_dir: /app/services/user-service

  maildev:
    image: maildev/maildev:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1080:1080"
    environment:
      MAILDEV_SMTP_PORT: 1025
      MAILDEV_WEB_PORT: 1080
    volumes:
      - maildev_data:/data

volumes:
  user_service_db_data:
  maildev_data:
